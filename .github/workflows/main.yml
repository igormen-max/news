name: Deploy News Digest Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch: # Позволяет запускать вручную

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run News Digest Script
        run: |
          # Эта команда найдет файл news_digest.py, даже если он в папке
          FILE_PATH=$(find . -name "news_digest.py" -print -quit)
          if [ -z "$FILE_PATH" ]; then
            echo "Ошибка: Файл news_digest.py не найден ни в одной папке!"
            exit 1
          fi
          python "$FILE_PATH"
